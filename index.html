<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快速翻译</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #6b7280;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --border: #e5e7eb;
            --textarea-bg: #f9fafb;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --primary: #818cf8;
            --primary-hover: #6366f1;
            --border: #334155;
            --textarea-bg: #0f172a;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
            position: relative;
        }

        header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        header h1 span {
            color: var(--primary);
        }

        .theme-toggle {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            border-color: var(--primary);
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .lang-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
        }

        .lang-bar select {
            background: var(--textarea-bg);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            min-width: 140px;
            outline: none;
            transition: border 0.2s;
        }

        .lang-bar select:focus {
            border-color: var(--primary);
        }

        .swap-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .swap-btn:hover {
            background: var(--primary-hover);
            transform: rotate(180deg);
        }

        .editor-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 280px;
        }

        @media (max-width: 640px) {
            .editor-area {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .panel:first-child {
            border-right: 1px solid var(--border);
        }

        @media (max-width: 640px) {
            .panel:first-child {
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
        }

        .panel textarea {
            width: 100%;
            height: 100%;
            min-height: 220px;
            padding: 20px 24px;
            border: none;
            background: transparent;
            color: var(--text);
            font-size: 16px;
            line-height: 1.6;
            resize: none;
            outline: none;
            font-family: inherit;
        }

        .panel textarea::placeholder {
            color: var(--text-secondary);
        }

        .panel-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
        }

        .char-count {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .panel-actions {
            display: flex;
            gap: 4px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: var(--textarea-bg);
            color: var(--primary);
        }

        .action-bar {
            display: flex;
            justify-content: center;
            padding: 16px;
            border-top: 1px solid var(--border);
        }

        .translate-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 48px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .translate-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .translate-btn:active {
            transform: translateY(0);
        }

        .translate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--text);
            color: var(--bg);
            padding: 10px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 999;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Keyboard shortcut hint */
        .shortcut-hint {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
            margin-top: 12px;
        }

        kbd {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1px 6px;
            font-size: 11px;
            font-family: inherit;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ 快速<span>翻译</span></h1>
            <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
        </header>

        <div class="card">
            <div class="lang-bar">
                <select id="sourceLang">
                    <option value="auto">自动检测</option>
                    <option value="zh-CN">中文（简体）</option>
                    <option value="zh-TW">中文（繁体）</option>
                    <option value="en-US">English</option>
                    <option value="ja">日本語</option>
                    <option value="ko">한국어</option>
                    <option value="fr">Français</option>
                    <option value="de">Deutsch</option>
                    <option value="es">Español</option>
                    <option value="ru">Русский</option>
                    <option value="pt">Português</option>
                    <option value="it">Italiano</option>
                    <option value="ar">العربية</option>
                </select>

                <button class="swap-btn" onclick="swapLangs()" title="交换语言">⇄</button>

                <select id="targetLang">
                    <option value="en-US">English</option>
                    <option value="zh-CN">中文（简体）</option>
                    <option value="zh-TW">中文（繁体）</option>
                    <option value="ja">日本語</option>
                    <option value="ko">한국어</option>
                    <option value="fr">Français</option>
                    <option value="de">Deutsch</option>
                    <option value="es">Español</option>
                    <option value="ru">Русский</option>
                    <option value="pt">Português</option>
                    <option value="it">Italiano</option>
                    <option value="ar">العربية</option>
                </select>
            </div>

            <div class="editor-area">
                <div class="panel">
                    <textarea id="sourceText" placeholder="输入要翻译的文本..." autofocus></textarea>
                    <div class="panel-footer">
                        <span class="char-count"><span id="charCount">0</span> 字符</span>
                        <div class="panel-actions">
                            <button class="icon-btn" onclick="clearSource()" title="清空">✕</button>
                        </div>
                    </div>
                </div>
                <div class="panel">
                    <textarea id="targetText" placeholder="翻译结果..." readonly></textarea>
                    <div class="panel-footer">
                        <span class="char-count" id="resultInfo"></span>
                        <div class="panel-actions">
                            <button class="icon-btn" onclick="copyResult()" title="复制">📋</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="action-bar">
                <button class="translate-btn" id="translateBtn" onclick="translate()">
                    翻译
                </button>
            </div>
        </div>

        <p class="shortcut-hint">按 <kbd>Ctrl</kbd> + <kbd>Enter</kbd> 快速翻译</p>

        <footer>
            自用快速翻译工具 · Powered by MyMemory API
        </footer>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const sourceText = document.getElementById('sourceText');
        const targetText = document.getElementById('targetText');
        const sourceLang = document.getElementById('sourceLang');
        const targetLang = document.getElementById('targetLang');
        const translateBtn = document.getElementById('translateBtn');
        const charCount = document.getElementById('charCount');
        const resultInfo = document.getElementById('resultInfo');

        // 字符计数
        sourceText.addEventListener('input', () => {
            charCount.textContent = sourceText.value.length;
        });

        // Ctrl+Enter 快捷翻译
        sourceText.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                translate();
            }
        });

        // 翻译函数
        async function translate() {
            const text = sourceText.value.trim();
            if (!text) {
                showToast('请输入要翻译的内容');
                return;
            }

            const src = sourceLang.value === 'auto' ? 'autodetect' : sourceLang.value.split('-')[0];
            const tgt = targetLang.value.split('-')[0];

            // 处理中文变体
            const srcCode = sourceLang.value === 'auto' ? 'autodetect' :
                            sourceLang.value === 'zh-CN' ? 'zh' :
                            sourceLang.value === 'zh-TW' ? 'zh' :
                            sourceLang.value.split('-')[0];
            const tgtCode = targetLang.value === 'zh-CN' ? 'zh' :
                            targetLang.value === 'zh-TW' ? 'zh' :
                            targetLang.value.split('-')[0];

            setLoading(true);

            try {
                const langpair = `${srcCode}|${tgtCode}`;
                const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${langpair}`;

                const response = await fetch(url);
                const data = await response.json();

                if (data.responseStatus === 200) {
                    targetText.value = data.responseData.translatedText;
                    resultInfo.textContent = `翻译完成`;
                } else {
                    targetText.value = '';
                    showToast('翻译失败，请重试');
                    resultInfo.textContent = '';
                }
            } catch (error) {
                console.error('翻译错误:', error);
                showToast('网络错误，请检查连接');
                resultInfo.textContent = '';
            } finally {
                setLoading(false);
            }
        }

        function setLoading(loading) {
            translateBtn.disabled = loading;
            translateBtn.innerHTML = loading
                ? '<div class="spinner"></div> 翻译中...'
                : '翻译';
        }

        // 交换语言
        function swapLangs() {
            if (sourceLang.value === 'auto') {
                showToast('请先选择源语言');
                return;
            }
            const temp = sourceLang.value;
            sourceLang.value = targetLang.value;
            targetLang.value = temp;

            // 同时交换文本
            const tempText = sourceText.value;
            sourceText.value = targetText.value;
            targetText.value = tempText;
            charCount.textContent = sourceText.value.length;
        }

        // 清空输入
        function clearSource() {
            sourceText.value = '';
            targetText.value = '';
            charCount.textContent = '0';
            resultInfo.textContent = '';
            sourceText.focus();
        }

        // 复制结果
        function copyResult() {
            const text = targetText.value.trim();
            if (!text) {
                showToast('没有可复制的内容');
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                showToast('✓ 已复制到剪贴板');
            }).catch(() => {
                // fallback
                targetText.select();
                document.execCommand('copy');
                showToast('✓ 已复制到剪贴板');
            });
        }

        // 主题切换
        function toggleTheme() {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            document.body.setAttribute('data-theme', isDark ? '' : 'dark');
            document.querySelector('.theme-toggle').textContent = isDark ? '🌙' : '☀️';
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        }

        // 加载主题
        (function loadTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.body.setAttribute('data-theme', 'dark');
                document.querySelector('.theme-toggle').textContent = '☀️';
            }
        })();

        // Toast 提示
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
