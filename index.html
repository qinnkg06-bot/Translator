<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>快速翻译</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f0f2f5;
    color: #333;
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 16px 24px;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }

  .header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 1px;
  }

  .header .subtitle {
    font-size: 12px;
    opacity: 0.8;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 24px;
    background: #fff;
    border-bottom: 1px solid #e8e8e8;
    flex-wrap: wrap;
  }

  select, button {
    font-size: 14px;
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid #d9d9d9;
    background: #fff;
    cursor: pointer;
    outline: none;
    transition: all 0.2s;
  }

  select:focus { border-color: #667eea; }

  .swap-btn {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 50%;
    transition: all 0.2s;
  }
  .swap-btn:hover { background: #f0f0f0; transform: rotate(180deg); }

  .translate-btn {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    border: none;
    font-weight: 600;
    padding: 8px 28px;
    font-size: 15px;
    letter-spacing: 1px;
  }
  .translate-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
  .translate-btn:active { transform: translateY(0); }
  .translate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  .clear-btn {
    background: #ff4d4f;
    color: #fff;
    border: none;
    font-size: 13px;
    padding: 8px 16px;
  }
  .clear-btn:hover { opacity: 0.85; }

  .engine-select { min-width: 130px; }

  .main {
    display: flex;
    gap: 0;
    height: calc(100vh - 130px);
    min-height: 400px;
  }

  .panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .panel:first-child { border-right: 2px solid #e8e8e8; }

  .panel-header {
    padding: 10px 18px;
    font-size: 13px;
    color: #888;
    background: #fafafa;
    border-bottom: 1px solid #f0f0f0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .char-count {
    font-size: 12px;
    color: #aaa;
  }

  textarea {
    flex: 1;
    width: 100%;
    padding: 16px 18px;
    border: none;
    outline: none;
    resize: none;
    font-size: 16px;
    line-height: 1.7;
    font-family: inherit;
    background: #fff;
  }

  textarea::placeholder { color: #ccc; }

  .result-area {
    flex: 1;
    width: 100%;
    padding: 16px 18px;
    font-size: 16px;
    line-height: 1.7;
    background: #fff;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
    user-select: text;
  }

  .result-area.empty {
    color: #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
  }

  .copy-btn {
    position: absolute;
    bottom: 14px;
    right: 14px;
    background: rgba(102,126,234,0.9);
    color: #fff;
    border: none;
    padding: 6px 16px;
    font-size: 13px;
    border-radius: 6px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .panel:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { background: rgba(102,126,234,1); }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    color: #667eea;
    font-size: 15px;
    height: 100%;
  }

  .spinner {
    width: 20px; height: 20px;
    border: 3px solid #e8e8e8;
    border-top-color: #667eea;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .status-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 6px 24px;
    background: #fafafa;
    border-top: 1px solid #e8e8e8;
    font-size: 12px;
    color: #999;
    display: flex;
    justify-content: space-between;
  }

  .toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: rgba(0,0,0,0.75);
    color: #fff;
    padding: 8px 24px;
    border-radius: 8px;
    font-size: 14px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* 多引擎结果标签 */
  .engine-tabs {
    display: flex;
    gap: 0;
    background: #fafafa;
    border-bottom: 1px solid #f0f0f0;
  }
  .engine-tab {
    padding: 6px 16px;
    font-size: 12px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    color: #999;
    transition: all 0.2s;
  }
  .engine-tab:hover { color: #667eea; }
  .engine-tab.active { color: #667eea; border-bottom-color: #667eea; font-weight: 600; }
  .engine-tab.error { color: #ff4d4f; }
  .engine-tab.loading { color: #faad14; }

  @media (max-width: 768px) {
    .main { flex-direction: column; height: auto; min-height: unset; }
    .panel { min-height: 250px; }
    .panel:first-child { border-right: none; border-bottom: 2px solid #e8e8e8; }
    .controls { justify-content: center; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>⚡ 快速翻译</h1>
    <div class="subtitle">多引擎 · 无限额度 · 超长文本</div>
  </div>
</div>

<div class="controls">
  <select id="sourceLang">
    <option value="auto">自动检测</option>
    <option value="zh">中文</option>
    <option value="en">English</option>
    <option value="ja">日本語</option>
    <option value="ko">한국어</option>
    <option value="fr">Français</option>
    <option value="de">Deutsch</option>
    <option value="es">Español</option>
    <option value="pt">Português</option>
    <option value="ru">Русский</option>
    <option value="ar">العربية</option>
    <option value="it">Italiano</option>
    <option value="th">ไทย</option>
    <option value="vi">Tiếng Việt</option>
  </select>

  <button class="swap-btn" onclick="swapLangs()" title="交换语言">⇄</button>

  <select id="targetLang">
    <option value="zh">中文</option>
    <option value="en" selected>English</option>
    <option value="ja">日本語</option>
    <option value="ko">한국어</option>
    <option value="fr">Français</option>
    <option value="de">Deutsch</option>
    <option value="es">Español</option>
    <option value="pt">Português</option>
    <option value="ru">Русский</option>
    <option value="ar">العربية</option>
    <option value="it">Italiano</option>
    <option value="th">ไทย</option>
    <option value="vi">Tiếng Việt</option>
  </select>

  <select id="engineSelect" class="engine-select">
    <option value="all">全部引擎</option>
    <option value="google">Google 翻译</option>
    <option value="mymemory">MyMemory</option>
    <option value="libre">LibreTranslate</option>
  </select>

  <button class="translate-btn" id="translateBtn" onclick="doTranslate()">翻 译</button>
  <button class="clear-btn" onclick="clearAll()">清空</button>
</div>

<div class="main">
  <!-- 输入区 -->
  <div class="panel">
    <div class="panel-header">
      <span>输入文本</span>
      <span class="char-count" id="charCount">0 字</span>
    </div>
    <textarea id="sourceText" placeholder="在此输入或粘贴要翻译的文本...&#10;&#10;支持超长文本，自动分段翻译 ✨"></textarea>
    <button class="copy-btn" onclick="copyText('sourceText')">复制原文</button>
  </div>

  <!-- 输出区 -->
  <div class="panel" id="resultPanel">
    <div class="panel-header">
      <span>翻译结果</span>
      <span class="char-count" id="resultInfo"></span>
    </div>
    <div class="engine-tabs" id="engineTabs" style="display:none;"></div>
    <div class="result-area empty" id="resultArea">翻译结果将显示在这里</div>
    <button class="copy-btn" onclick="copyResult()">复制译文</button>
  </div>
</div>

<div class="status-bar">
  <span id="statusText">就绪</span>
  <span>Ctrl+Enter 翻译 · 支持分段翻译超长文本</span>
</div>

<div class="toast" id="toast"></div>

<script>
// ===================== 配置 =====================
const CHUNK_SIZE = 4800; // 每段最大字符数（确保不超 API 限制）

// ===================== 工具函数 =====================
const $ = id => document.getElementById(id);
const sourceText = $('sourceText');
const resultArea = $('resultArea');
const charCount = $('charCount');
const statusText = $('statusText');
const translateBtn = $('translateBtn');

let results = {}; // { engine: { text, error, time } }
let activeTab = '';

// 字数统计
sourceText.addEventListener('input', () => {
  const len = sourceText.value.length;
  charCount.textContent = `${len.toLocaleString()} 字`;
});

// 快捷键
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); doTranslate(); }
});

// Toast
function showToast(msg, ms = 2000) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

// 交换语言
function swapLangs() {
  const s = $('sourceLang'), t = $('targetLang');
  if (s.value === 'auto') { showToast('源语言为自动检测，无法交换'); return; }
  [s.value, t.value] = [t.value, s.value];
  // 同时交换文本
  if (resultArea.dataset.text) {
    sourceText.value = resultArea.dataset.text;
    sourceText.dispatchEvent(new Event('input'));
  }
}

// 清空
function clearAll() {
  sourceText.value = '';
  resultArea.textContent = '翻译结果将显示在这里';
  resultArea.className = 'result-area empty';
  resultArea.dataset.text = '';
  $('engineTabs').style.display = 'none';
  $('engineTabs').innerHTML = '';
  $('resultInfo').textContent = '';
  charCount.textContent = '0 字';
  results = {};
  statusText.textContent = '就绪';
}

// 复制
function copyText(id) {
  navigator.clipboard.writeText($(id).value || $(id).textContent).then(() => showToast('已复制 ✓'));
}
function copyResult() {
  const text = resultArea.dataset.text || resultArea.textContent;
  navigator.clipboard.writeText(text).then(() => showToast('已复制译文 ✓'));
}

// ===================== 文本分段 =====================
function splitText(text) {
  if (text.length <= CHUNK_SIZE) return [text];
  const chunks = [];
  // 优先按段落分割
  const paragraphs = text.split(/\n\n+/);
  let current = '';
  for (const para of paragraphs) {
    if (para.length > CHUNK_SIZE) {
      if (current) { chunks.push(current); current = ''; }
      // 按句子分割超长段落
      const sentences = para.split(/(?<=[.。!！?？;；\n])\s*/);
      for (const sent of sentences) {
        if ((current + sent).length > CHUNK_SIZE && current) {
          chunks.push(current); current = '';
        }
        current += sent;
      }
    } else if ((current + '\n\n' + para).length > CHUNK_SIZE && current) {
      chunks.push(current);
      current = para;
    } else {
      current = current ? current + '\n\n' + para : para;
    }
  }
  if (current) chunks.push(current);
  return chunks;
}

// ===================== 翻译引擎 =====================
const ENGINES = {
  google: {
    name: 'Google',
    translate: async (text, from, to) => {
      const langMap = { zh: 'zh-CN' };
      const sl = langMap[from] || from;
      const tl = langMap[to] || to;
      const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(text)}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      return data[0].map(s => s[0]).join('');
    }
  },
  mymemory: {
    name: 'MyMemory',
    translate: async (text, from, to) => {
      const langMap = { zh: 'zh-CN', auto: '' };
      const sl = langMap[from] ?? from;
      const tl = langMap[to] ?? to;
      const langpair = `${sl || 'autodetect'}|${tl}`;
      const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${encodeURIComponent(langpair)}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data.responseStatus === 403) throw new Error(data.responseDetails || '被限流');
      return data.responseData.translatedText;
    }
  },
  libre: {
    name: 'Libre',
    translate: async (text, from, to) => {
      const langMap = { zh: 'zh' };
      const sl = from === 'auto' ? 'auto' : (langMap[from] || from);
      const tl = langMap[to] || to;
      const res = await fetch('https://libretranslate.de/translate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ q: text, source: sl, target: tl, format: 'text' })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      return data.translatedText;
    }
  }
};

// 用单个引擎翻译（支持分段）
async function translateWithEngine(engineKey, text, from, to, onProgress) {
  const engine = ENGINES[engineKey];
  const chunks = splitText(text);
  const translated = [];

  for (let i = 0; i < chunks.length; i++) {
    onProgress?.(`${engine.name}: ${i + 1}/${chunks.length}`);
    const result = await engine.translate(chunks[i], from, to);
    translated.push(result);
    // 简单限速
    if (chunks.length > 1 && i < chunks.length - 1) {
      await new Promise(r => setTimeout(r, 300));
    }
  }
  return translated.join('\n\n');
}

// ===================== 主翻译逻辑 =====================
async function doTranslate() {
  const text = sourceText.value.trim();
  if (!text) { showToast('请输入要翻译的文本'); return; }

  const from = $('sourceLang').value;
  const to = $('targetLang').value;
  const selectedEngine = $('engineSelect').value;
  const engines = selectedEngine === 'all' ? Object.keys(ENGINES) : [selectedEngine];

  // UI 状态
  translateBtn.disabled = true;
  results = {};
  activeTab = engines[0];

  // 显示 loading
  resultArea.innerHTML = `<div class="loading"><div class="spinner"></div><span>翻译中...</span></div>`;
  resultArea.className = 'result-area';
  resultArea.dataset.text = '';

  // Tabs
  const tabsEl = $('engineTabs');
  if (engines.length > 1) {
    tabsEl.style.display = 'flex';
    tabsEl.innerHTML = engines.map((k, i) =>
      `<div class="engine-tab loading ${i === 0 ? 'active' : ''}" data-engine="${k}">${ENGINES[k].name}...</div>`
    ).join('');
    tabsEl.querySelectorAll('.engine-tab').forEach(tab => {
      tab.addEventListener('click', () => switchTab(tab.dataset.engine));
    });
  } else {
    tabsEl.style.display = 'none';
    tabsEl.innerHTML = '';
  }

  const startTime = Date.now();

  // 并发请求所有引擎
  const promises = engines.map(async (engineKey) => {
    const t0 = Date.now();
    try {
      const translated = await translateWithEngine(engineKey, text, from, to, (msg) => {
        statusText.textContent = msg;
        // 更新 tab
        const tab = tabsEl.querySelector(`[data-engine="${engineKey}"]`);
        if (tab) tab.textContent = `${ENGINES[engineKey].name} ⏳`;
      });
      const elapsed = ((Date.now() - t0) / 1000).toFixed(1);
      results[engineKey] = { text: translated, time: elapsed };
      // 更新 tab
      const tab = tabsEl.querySelector(`[data-engine="${engineKey}"]`);
      if (tab) { tab.textContent = `${ENGINES[engineKey].name} ✓ ${elapsed}s`; tab.classList.remove('loading'); }
      // 如果是第一个完成的 或 当前激活的tab，显示结果
      if (engineKey === activeTab || !resultArea.dataset.text) {
        showResult(engineKey);
      }
    } catch (err) {
      results[engineKey] = { error: err.message };
      const tab = tabsEl.querySelector(`[data-engine="${engineKey}"]`);
      if (tab) { tab.textContent = `${ENGINES[engineKey].name} ✗`; tab.classList.remove('loading'); tab.classList.add('error'); }
      if (engineKey === activeTab) showResult(engineKey);
    }
  });

  await Promise.allSettled(promises);

  const totalTime = ((Date.now() - startTime) / 1000).toFixed(1);
  statusText.textContent = `完成 · 耗时 ${totalTime}s`;
  translateBtn.disabled = false;

  // 如果所有引擎都失败
  const anySuccess = Object.values(results).some(r => r.text);
  if (!anySuccess) {
    resultArea.textContent = '所有翻译引擎均失败，请稍后重试。\n\n' +
      Object.entries(results).map(([k, v]) => `${ENGINES[k].name}: ${v.error}`).join('\n');
    resultArea.className = 'result-area';
  }
}

function showResult(engineKey) {
  const r = results[engineKey];
  if (!r) return;
  activeTab = engineKey;

  // 更新 tab active
  $('engineTabs').querySelectorAll('.engine-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.engine === engineKey);
  });

  if (r.error) {
    resultArea.textContent = `${ENGINES[engineKey].name} 翻译失败: ${r.error}`;
    resultArea.className = 'result-area';
    resultArea.dataset.text = '';
    $('resultInfo').textContent = '';
  } else {
    resultArea.textContent = r.text;
    resultArea.className = 'result-area';
    resultArea.dataset.text = r.text;
    $('resultInfo').textContent = `${r.text.length.toLocaleString()} 字 · ${r.time}s`;
  }
}

function switchTab(engineKey) {
  if (results[engineKey]) showResult(engineKey);
}

// 自动检测输入语言并智能切换目标语言
sourceText.addEventListener('input', debounce(() => {
  const text = sourceText.value.trim().substring(0, 50);
  if (!text) return;
  const hasChinese = /[\u4e00-\u9fff]/.test(text);
  const hasJapanese = /[\u3040-\u309f\u30a0-\u30ff]/.test(text);
  const hasKorean = /[\uac00-\ud7af]/.test(text);

  const target = $('targetLang');
  if (hasChinese && target.value === 'zh') target.value = 'en';
  else if (!hasChinese && !hasJapanese && !hasKorean && target.value === 'en') target.value = 'zh';
}, 500));

function debounce(fn, ms) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); };
}
</script>

</body>
</html>
