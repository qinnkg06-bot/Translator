<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快速翻译 - 百度翻译API</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #6b7280;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --border: #e5e7eb;
            --textarea-bg: #f9fafb;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            --success: #10b981;
            --warning: #f59e0b;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --primary: #818cf8;
            --primary-hover: #6366f1;
            --border: #334155;
            --textarea-bg: #0f172a;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
            position: relative;
        }

        header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        header h1 span { color: var(--primary); }

        .header-actions {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 8px;
        }

        .header-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .header-btn:hover { border-color: var(--primary); }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        /* === 设置面板 === */
        .settings-panel {
            display: none;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--textarea-bg);
        }

        .settings-panel.show { display: block; }

        .settings-panel h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .settings-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .settings-row .field {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .settings-row label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .settings-row input {
            background: var(--card-bg);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            font-family: 'Courier New', monospace;
            transition: border 0.2s;
        }

        .settings-row input:focus { border-color: var(--primary); }

        .save-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            height: 37px;
        }

        .save-btn:hover { background: var(--primary-hover); }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--warning);
        }

        .status-dot.connected { background: var(--success); }

        /* === 语言栏 === */
        .lang-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
        }

        .lang-bar select {
            background: var(--textarea-bg);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            min-width: 140px;
            outline: none;
            transition: border 0.2s;
        }

        .lang-bar select:focus { border-color: var(--primary); }

        .swap-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .swap-btn:hover {
            background: var(--primary-hover);
            transform: rotate(180deg);
        }

        /* === 编辑区 === */
        .editor-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 280px;
        }

        @media (max-width: 640px) {
            .editor-area { grid-template-columns: 1fr; }
            .settings-row { flex-direction: column; }
        }

        .panel {
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .panel:first-child { border-right: 1px solid var(--border); }

        @media (max-width: 640px) {
            .panel:first-child {
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
        }

        .panel textarea {
            width: 100%;
            height: 100%;
            min-height: 220px;
            padding: 20px 24px;
            border: none;
            background: transparent;
            color: var(--text);
            font-size: 16px;
            line-height: 1.6;
            resize: none;
            outline: none;
            font-family: inherit;
        }

        .panel textarea::placeholder { color: var(--text-secondary); }

        .panel-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
        }

        .char-count {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .panel-actions { display: flex; gap: 4px; }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: var(--textarea-bg);
            color: var(--primary);
        }

        /* === 操作栏 === */
        .action-bar {
            display: flex;
            justify-content: center;
            padding: 16px;
            border-top: 1px solid var(--border);
        }

        .translate-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 48px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .translate-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .translate-btn:active { transform: translateY(0); }

        .translate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* === Toast === */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--text);
            color: var(--bg);
            padding: 10px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 999;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .shortcut-hint {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
            margin-top: 12px;
        }

        kbd {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1px 6px;
            font-size: 11px;
            font-family: inherit;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ 快速<span>翻译</span></h1>
            <div class="header-actions">
                <button class="header-btn" onclick="toggleSettings()" title="API 设置">⚙️</button>
                <button class="header-btn" onclick="toggleTheme()" title="切换主题">🌙</button>
            </div>
        </header>

        <div class="card">
            <!-- 设置面板 -->
            <div class="settings-panel" id="settingsPanel">
                <h3><span class="status-dot" id="statusDot"></span> 百度翻译 API 配置</h3>
                <div class="settings-row">
                    <div class="field">
                        <label>APP ID</label>
                        <input type="text" id="appIdInput" placeholder="输入你的 APP ID">
                    </div>
                    <div class="field">
                        <label>密钥（Secret Key）</label>
                        <input type="password" id="secretInput" placeholder="输入你的密钥">
                    </div>
                    <button class="save-btn" onclick="saveConfig()">保存</button>
                </div>
            </div>

            <!-- 语言栏 -->
            <div class="lang-bar">
                <select id="sourceLang">
                    <option value="auto">自动检测</option>
                    <option value="zh">中文</option>
                    <option value="en">English</option>
                    <option value="jp">日本語</option>
                    <option value="kor">한국어</option>
                    <option value="fra">Français</option>
                    <option value="de">Deutsch</option>
                    <option value="spa">Español</option>
                    <option value="ru">Русский</option>
                    <option value="pt">Português</option>
                    <option value="it">Italiano</option>
                    <option value="ara">العربية</option>
                    <option value="th">ไทย</option>
                    <option value="vie">Tiếng Việt</option>
                </select>

                <button class="swap-btn" onclick="swapLangs()" title="交换语言">⇄</button>

                <select id="targetLang">
                    <option value="en">English</option>
                    <option value="zh">中文</option>
                    <option value="jp">日本語</option>
                    <option value="kor">한국어</option>
                    <option value="fra">Français</option>
                    <option value="de">Deutsch</option>
                    <option value="spa">Español</option>
                    <option value="ru">Русский</option>
                    <option value="pt">Português</option>
                    <option value="it">Italiano</option>
                    <option value="ara">العربية</option>
                    <option value="th">ไทย</option>
                    <option value="vie">Tiếng Việt</option>
                </select>
            </div>

            <!-- 编辑区 -->
            <div class="editor-area">
                <div class="panel">
                    <textarea id="sourceText" placeholder="输入要翻译的文本..." autofocus></textarea>
                    <div class="panel-footer">
                        <span class="char-count"><span id="charCount">0</span> 字符</span>
                        <div class="panel-actions">
                            <button class="icon-btn" onclick="clearSource()" title="清空">✕</button>
                        </div>
                    </div>
                </div>
                <div class="panel">
                    <textarea id="targetText" placeholder="翻译结果..." readonly></textarea>
                    <div class="panel-footer">
                        <span class="char-count" id="resultInfo"></span>
                        <div class="panel-actions">
                            <button class="icon-btn" onclick="copyResult()" title="复制">📋</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="action-bar">
                <button class="translate-btn" id="translateBtn" onclick="translate()">
                    翻译
                </button>
            </div>
        </div>

        <p class="shortcut-hint">按 <kbd>Ctrl</kbd> + <kbd>Enter</kbd> 快速翻译</p>

        <footer>
            自用快速翻译工具 · Powered by 百度翻译 API（免费 · 不限量）
        </footer>
    </div>

    <div class="toast" id="toast"></div>

    <!-- MD5 库（百度翻译签名需要） -->

    <script>
        // ========== DOM 元素 ==========
        const sourceText = document.getElementById('sourceText');
        const targetText = document.getElementById('targetText');
        const sourceLang = document.getElementById('sourceLang');
        const targetLang = document.getElementById('targetLang');
        const translateBtn = document.getElementById('translateBtn');
        const charCount = document.getElementById('charCount');
        const resultInfo = document.getElementById('resultInfo');
        const appIdInput = document.getElementById('appIdInput');
        const secretInput = document.getElementById('secretInput');
        const statusDot = document.getElementById('statusDot');

        // ========== 配置管理 ==========
        function loadConfig() {
            const appid = localStorage.getItem('baidu_appid') || '';
            const secret = localStorage.getItem('baidu_secret') || '';
            appIdInput.value = appid;
            secretInput.value = secret;
            updateStatus();
            return { appid, secret };
        }

        function saveConfig() {
            const appid = appIdInput.value.trim();
            const secret = secretInput.value.trim();
            if (!appid || !secret) {
                showToast('请填写完整的 APP ID 和密钥');
                return;
            }
            localStorage.setItem('baidu_appid', appid);
            localStorage.setItem('baidu_secret', secret);
            updateStatus();
            showToast('✓ 配置已保存');
        }

        function updateStatus() {
            const appid = localStorage.getItem('baidu_appid');
            const secret = localStorage.getItem('baidu_secret');
            if (appid && secret) {
                statusDot.classList.add('connected');
            } else {
                statusDot.classList.remove('connected');
            }
        }

        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            panel.classList.toggle('show');
        }

        // 初始化加载配置
        loadConfig();

        // 首次使用自动展开设置
        if (!localStorage.getItem('baidu_appid')) {
            document.getElementById('settingsPanel').classList.add('show');
        }

        // ========== 字符计数 ==========
        sourceText.addEventListener('input', () => {
            charCount.textContent = sourceText.value.length;
        });

        // ========== 快捷键 ==========
        sourceText.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                translate();
            }
        });

        // ========== 百度翻译核心 ==========
        async function translate() {
            const text = sourceText.value.trim();
            if (!text) {
                showToast('请输入要翻译的内容');
                return;
            }

            const appid = localStorage.getItem('baidu_appid');
            const secret = localStorage.getItem('baidu_secret');

            if (!appid || !secret) {
                showToast('请先配置 API 密钥（点击 ⚙️）');
                document.getElementById('settingsPanel').classList.add('show');
                return;
            }

            const from = sourceLang.value;
            const to = targetLang.value;
            const salt = Date.now().toString();

            // 百度翻译签名：MD5(appid + q + salt + secret)
            const sign = MD5(appid + text + salt + secret);

            setLoading(true);

            try {
                // 使用 JSONP 方式避免 CORS 问题
                const params = new URLSearchParams({
                    q: text,
                    from: from,
                    to: to,
                    appid: appid,
                    salt: salt,
                    sign: sign
                });

                const url = `https://corsproxy.io/?${encodeURIComponent('https://fanyi-api.baidu.com/api/trans/vip/translate?' + params.toString())}`;

                // 尝试 fetch（部分浏览器/环境可能有 CORS 限制）
                const response = await fetch(url, {
                    method: 'GET',
                    // 百度翻译 API 支持 CORS
                });

                const data = await response.json();

                if (data.error_code) {
                    const errorMsg = {
                        '52001': '请求超时，请重试',
                        '52002': '系统错误，请重试',
                        '52003': '未授权，请检查 APP ID',
                        '54000': '必填参数为空',
                        '54001': '签名错误，请检查密钥是否正确',
                        '54003': '访问频率受限（1次/秒），请稍后重试',
                        '54004': '账户余额不足',
                        '54005': '长query请求频繁，请稍后重试',
                        '58000': '客户端IP非法，请检查服务器IP白名单',
                        '58001': '译文语言方向不支持',
                        '58002': '服务关闭，请前往管理控制台开启',
                        '90107': '认证未通过或未生效',
                    }[data.error_code] || `错误码: ${data.error_code}`;
                    showToast(errorMsg);
                    targetText.value = '';
                    resultInfo.textContent = '';
                } else if (data.trans_result) {
                    const result = data.trans_result.map(item => item.dst).join('\n');
                    targetText.value = result;

                    // 显示检测到的源语言
                    const langNames = {
                        'zh': '中文', 'en': '英语', 'jp': '日语', 'kor': '韩语',
                        'fra': '法语', 'de': '德语', 'spa': '西班牙语', 'ru': '俄语',
                        'pt': '葡萄牙语', 'it': '意大利语', 'ara': '阿拉伯语',
                        'th': '泰语', 'vie': '越南语'
                    };
                    const detectedLang = langNames[data.from] || data.from;
                    resultInfo.textContent = from === 'auto'
                        ? `翻译完成 · 检测为${detectedLang}`
                        : '翻译完成';
                }
            } catch (error) {
                console.error('翻译错误:', error);

                // fetch 失败时尝试 JSONP
                if (error.message && error.message.includes('CORS')) {
                    showToast('CORS 受限，建议部署到服务器使用');
                } else {
                    showToast('网络错误，请检查连接');
                }
                resultInfo.textContent = '';
            } finally {
                setLoading(false);
            }
        }

        function setLoading(loading) {
            translateBtn.disabled = loading;
            translateBtn.innerHTML = loading
                ? '<div class="spinner"></div> 翻译中...'
                : '翻译';
        }

        // ========== 交换语言 ==========
        function swapLangs() {
            if (sourceLang.value === 'auto') {
                showToast('请先选择源语言');
                return;
            }
            const temp = sourceLang.value;
            sourceLang.value = targetLang.value;
            targetLang.value = temp;

            const tempText = sourceText.value;
            sourceText.value = targetText.value;
            targetText.value = tempText;
            charCount.textContent = sourceText.value.length;
        }

        // ========== 清空 ==========
        function clearSource() {
            sourceText.value = '';
            targetText.value = '';
            charCount.textContent = '0';
            resultInfo.textContent = '';
            sourceText.focus();
        }

        // ========== 复制 ==========
        function copyResult() {
            const text = targetText.value.trim();
            if (!text) {
                showToast('没有可复制的内容');
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                showToast('✓ 已复制到剪贴板');
            }).catch(() => {
                targetText.select();
                document.execCommand('copy');
                showToast('✓ 已复制到剪贴板');
            });
        }

        // ========== 主题 ==========
        function toggleTheme() {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            document.body.setAttribute('data-theme', isDark ? '' : 'dark');
            document.querySelector('.header-actions').children[1].textContent = isDark ? '🌙' : '☀️';
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        }

        (function loadTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.body.setAttribute('data-theme', 'dark');
                document.querySelector('.header-actions').children[1].textContent = '☀️';
            }
        })();

        // ========== Toast ==========
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
    </script>
</body>
</html>
